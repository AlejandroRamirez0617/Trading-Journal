<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trading Journal 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#222;
  --txt:#f0f0f0;--txt2:#888;--txt3:#555;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --radius:10px;--radius-lg:14px;
  --orange:#FF6B35;--blue:#118AB2;--green:#06D6A0;--red:#EF476F;--purple:#7B61FF;
}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.wrap{max-width:960px;margin:0 auto;padding:2rem 1.25rem}
.hero{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:10px}
.hero h1{font-size:24px;font-weight:700;letter-spacing:-.5px}
.hero h1 span{color:var(--orange)}
.pill{font-family:'DM Mono',monospace;font-size:11px;color:var(--txt2);background:var(--bg2);padding:5px 12px;border-radius:20px;border:1px solid var(--border)}
.nav{display:flex;gap:6px;margin-bottom:1.75rem;flex-wrap:wrap}
.nav-btn{font-family:'Syne',sans-serif;font-size:13px;font-weight:500;padding:7px 18px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--txt2);cursor:pointer;transition:all .15s}
.nav-btn:hover{border-color:var(--border2);color:var(--txt)}
.nav-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.section{display:none}.section.show{display:block}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--txt2)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:1.5rem}
.mc{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;border:1px solid var(--border)}
.mc .ml{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.mc .mv{font-family:'DM Mono',monospace;font-size:20px;font-weight:500}

/* CALENDARIO */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.cal-title{font-size:17px;font-weight:700}
.cal-nav{display:flex;gap:6px}
.cal-nav button{font-family:'Syne',sans-serif;font-size:14px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--txt);cursor:pointer;transition:all .15s}
.cal-nav button:hover{border-color:var(--border2)}
.cal-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:8px;margin-bottom:1.25rem}
.cs{background:var(--bg2);border-radius:var(--radius);padding:11px 13px;border:1px solid var(--border)}
.cs .cl{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.cs .cv{font-family:'DM Mono',monospace;font-size:18px;font-weight:500}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px}
.wd{text-align:center;font-size:11px;font-weight:500;color:var(--txt3);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day{border-radius:var(--radius);padding:9px 8px;min-height:76px;display:flex;flex-direction:column;cursor:pointer;transition:opacity .15s;border:1px solid transparent}
.day:hover{opacity:.8}
.day.empty{background:transparent;cursor:default;pointer-events:none}
.day.zero{background:var(--bg2);border-color:var(--border)}
.day.win{background:#14532d;border-color:#166534}
.day.loss{background:#4c1d24;border-color:#7f1d1d}
.day.future{background:var(--bg2);opacity:.3;cursor:default;pointer-events:none}
.day.today{box-shadow:0 0 0 2px var(--orange)}
.day .dn{font-size:11px;font-weight:500;color:rgba(255,255,255,.45);margin-bottom:5px}
.day.zero .dn,.day.future .dn{color:var(--txt3)}
.day .da{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:#fff;line-height:1.2}
.day.zero .da,.day.future .da{color:var(--txt3)}
.day .dt{font-size:10px;color:rgba(255,255,255,.5);margin-top:3px}
.day.zero .dt{color:var(--txt3)}

/* FORM */
.form-card{background:var(--bg2);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.5rem;border:1px solid var(--border)}
.form-card h3{font-size:13px;font-weight:500;color:var(--txt2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}
.form-grid input,.form-grid select,.form-grid textarea{font-family:'Syne',sans-serif;font-size:13px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--txt);width:100%;outline:none;transition:border-color .15s}
.form-grid textarea{resize:vertical;min-height:40px;grid-column:1/-1}
.form-grid input:focus,.form-grid select:focus,.form-grid textarea:focus{border-color:var(--orange)}
.form-grid select option{background:var(--bg3)}
.field-label{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px}
.emp-row{margin-bottom:12px}
.pill-group{display:flex;gap:6px;flex-wrap:wrap;min-height:34px;align-items:center}
.ep{font-family:'Syne',sans-serif;font-size:12px;font-weight:500;padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--txt2);cursor:pointer;transition:all .15s}
.ep:hover{border-color:var(--border2);color:var(--txt)}
.ep.sel{color:#fff;border-color:transparent}
.cp{font-family:'DM Mono',monospace;font-size:12px;padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--txt2);cursor:pointer;transition:all .15s}
.cp:hover{border-color:var(--border2);color:var(--txt)}
.cp.sel{background:var(--bg3);color:var(--txt);border-color:var(--border2);font-weight:500}
.hint-text{font-size:12px;color:var(--txt3)}
.btn-add{font-family:'Syne',sans-serif;font-size:13px;font-weight:500;padding:9px 22px;border-radius:20px;border:none;background:var(--orange);color:#fff;cursor:pointer;transition:opacity .15s}
.btn-add:hover{opacity:.85}
.btn-sec{font-family:'Syne',sans-serif;font-size:12px;font-weight:500;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--txt2);cursor:pointer;transition:all .15s}
.btn-sec:hover{color:var(--txt);border-color:var(--border2)}
.btn-danger{font-family:'Syne',sans-serif;font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid rgba(239,71,111,.3);background:transparent;color:var(--red);cursor:pointer;transition:all .15s}
.btn-danger:hover{background:rgba(239,71,111,.1)}

/* PLAN SEMANAL */
.dias-semana{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.dia-btn{font-family:'Syne',sans-serif;font-size:13px;font-weight:500;padding:7px 18px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--txt2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.dia-btn:hover{border-color:var(--border2);color:var(--txt)}
.dia-btn.active{background:var(--txt);color:var(--bg);border-color:var(--txt)}
.dia-btn.hoy{box-shadow:0 0 0 2px var(--orange)}
.hoy-badge{font-size:10px;font-weight:500;padding:1px 7px;border-radius:10px;background:var(--orange);color:#fff}
.plan-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.plan-title{font-size:13px;color:var(--txt2);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.cuentas-plan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin-bottom:1.5rem}
.plan-card{background:var(--bg2);border-radius:var(--radius-lg);padding:1rem 1.1rem;border:1px solid var(--border)}
.plan-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.plan-card-emp{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--txt2)}
.plan-card-tipo{font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px}
.plan-card-nombre{font-size:20px;font-weight:700;margin-bottom:12px}
.plan-params{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.pp{background:var(--bg3);border-radius:8px;padding:8px 10px;border:1px solid var(--border)}
.pp .ppl{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.pp .ppv{font-family:'DM Mono',monospace;font-size:15px;font-weight:500}
.pp.full{grid-column:1/-1}
.plan-actions{display:flex;gap:6px}
.plan-btn-edit{font-family:'Syne',sans-serif;font-size:12px;font-weight:500;padding:6px 0;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--txt);cursor:pointer;flex:1;transition:all .15s}
.plan-btn-edit:hover{background:var(--bg3)}
.plan-btn-rem{font-family:'Syne',sans-serif;font-size:12px;font-weight:500;padding:6px 0;border-radius:8px;border:1px solid rgba(239,71,111,.3);background:transparent;color:var(--red);cursor:pointer;flex:1;transition:all .15s}
.plan-btn-rem:hover{background:rgba(239,71,111,.08)}
.plan-empty{text-align:center;padding:2.5rem;font-size:13px;color:var(--txt3);border:1px dashed var(--border);border-radius:var(--radius-lg);margin-bottom:1.5rem}
.plan-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.plan-modal{background:var(--bg2);border-radius:var(--radius-lg);padding:1.5rem;width:90%;max-width:450px;border:1px solid var(--border2);max-height:88vh;overflow-y:auto}
.plan-modal h3{font-size:15px;font-weight:700;margin-bottom:1.25rem}
.plan-modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--txt2);line-height:1}
.pf{margin-bottom:10px}
.pf label{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:5px}
.pf input,.pf select{font-family:'Syne',sans-serif;font-size:13px;padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--txt);width:100%;outline:none;transition:border-color .15s}
.pf input:focus,.pf select:focus{border-color:var(--orange)}
.pf select option{background:var(--bg3)}
.pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dias-check{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.dc{font-family:'Syne',sans-serif;font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--txt2);cursor:pointer;transition:all .15s}
.dc.sel{background:var(--txt);color:var(--bg);border-color:var(--txt)}
.plan-modal-footer{display:flex;gap:8px;margin-top:1rem}
.pm-save{font-family:'Syne',sans-serif;font-size:13px;font-weight:500;padding:9px 0;border-radius:20px;border:none;background:var(--orange);color:#fff;cursor:pointer;flex:1}
.pm-cancel{font-family:'Syne',sans-serif;font-size:13px;padding:9px 0;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--txt2);cursor:pointer;flex:1}
.color-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.co{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.co.sel{border-color:#fff;transform:scale(1.2)}


.empresa-card{background:var(--bg2);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:10px;border:1px solid var(--border)}
.empresa-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.empresa-name{display:flex;align-items:center;gap:8px}
.emp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.empresa-title{font-size:14px;font-weight:700}
.cuentas-grid{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.cuenta-chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);font-family:'DM Mono',monospace;font-size:12px}
.cuenta-chip .tipo{font-size:10px;color:var(--txt2);font-family:'Syne',sans-serif;margin-left:2px}
.cuenta-chip .del-c{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:13px;padding:0;line-height:1;margin-left:4px;transition:color .15s}
.cuenta-chip .del-c:hover{color:var(--red)}
.add-cuenta-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border)}
.add-cuenta-row input,.add-cuenta-row select{font-family:'Syne',sans-serif;font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--txt);outline:none;transition:border-color .15s}
.add-cuenta-row input{width:130px}
.add-cuenta-row input:focus,.add-cuenta-row select:focus{border-color:var(--orange)}
.add-cuenta-row select option{background:var(--bg)}
.add-emp-form{background:var(--bg2);border-radius:var(--radius-lg);padding:1.25rem;border:1px solid var(--border);margin-top:1rem}
.add-emp-form h3{font-size:13px;font-weight:500;color:var(--txt2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}
.add-emp-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.add-emp-row input{font-family:'Syne',sans-serif;font-size:13px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--txt);outline:none;width:180px;transition:border-color .15s}
.add-emp-row input:focus{border-color:var(--orange)}
.color-pick{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.color-opt{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.color-opt.sel{border-color:#fff;transform:scale(1.2)}
.divider{height:1px;background:var(--border);margin:1.25rem 0}

/* TABLA */
.tbl-wrap{overflow-x:auto;margin-bottom:1.5rem}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:620px}
th{text-align:left;padding:9px 11px;font-size:11px;color:var(--txt2);font-weight:500;border-bottom:1px solid var(--border);letter-spacing:.3px;text-transform:uppercase}
td{padding:10px 11px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;color:var(--txt)}
td.nc{font-family:'Syne',sans-serif;font-weight:500;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-family:'Syne',sans-serif;font-weight:500}
.badge.pos{background:rgba(6,214,160,.12);color:var(--green)}
.badge.neg{background:rgba(239,71,111,.12);color:var(--red)}
.sdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.del-btn{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:14px;padding:0 4px;transition:color .15s}
.del-btn:hover{color:var(--red)}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-row select{font-family:'Syne',sans-serif;font-size:12px;padding:6px 12px;border:1px solid var(--border);border-radius:20px;background:var(--bg2);color:var(--txt);outline:none;cursor:pointer}
.filter-row select option{background:var(--bg2)}
.empty{text-align:center;padding:3rem;font-size:13px;color:var(--txt3)}
.month-group{margin-bottom:1.75rem}
.month-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.month-title .mt-sum{font-family:'DM Mono',monospace;font-size:14px;font-weight:400}

/* STATS */
.chart-wrap{background:var(--bg2);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.5rem;border:1px solid var(--border)}
.chart-wrap h3{font-size:13px;color:var(--txt2);margin-bottom:12px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.chart-h{position:relative;width:100%;height:230px}
.chart-h.tall{height:270px}
.seg-btns{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.seg-btn{font-family:'Syne',sans-serif;font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--txt2);cursor:pointer;transition:all .15s}
.seg-btn.active{background:var(--txt);color:var(--bg);border-color:var(--txt)}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--txt2)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.ranking-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:8px;margin-bottom:1.5rem}
.rank-card{background:var(--bg2);border-radius:var(--radius);padding:13px 15px;border:1px solid var(--border);display:flex;align-items:center;gap:13px}
.rank-num{font-size:24px;font-weight:700;min-width:30px;font-family:'DM Mono',monospace}
.rank-num.r1{color:#FFD23F}.rank-num.r2{color:#9CA3AF}.rank-num.r3{color:#CD7F32}.rank-num.r4{color:var(--txt3)}
.rank-info .rn{font-size:13px;font-weight:500}
.rank-info .rv{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;margin-top:3px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border-radius:var(--radius-lg);padding:1.5rem;width:90%;max-width:440px;border:1px solid var(--border2);max-height:85vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:1.25rem}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--txt2);line-height:1;margin-top:-3px;transition:color .15s}
.modal-close:hover{color:var(--txt)}
.op-card{border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;margin-bottom:10px}
.op-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.op-card-meta{font-family:'DM Mono',monospace;font-size:12px;color:var(--txt2);display:flex;gap:12px;flex-wrap:wrap;margin-top:5px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>Trading <span>Journal</span> 2026</h1>
    <span class="pill">Registro diario</span>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showSec('cal',this)">Calendario</button>
    <button class="nav-btn" onclick="showSec('nueva',this)">+ Nueva operacion</button>
    <button class="nav-btn" onclick="showSec('historial',this)">Historial</button>
    <button class="nav-btn" onclick="showSec('meses',this)">Por mes</button>
    <button class="nav-btn" onclick="showSec('stats',this)">Estrategias</button>
    <button class="nav-btn" onclick="showSec('cuentas',this)">Mis cuentas</button>
    <button class="nav-btn" onclick="showSec('plan',this)">Plan semanal</button>
  </div>

  <!-- CALENDARIO -->
  <div class="section show" id="sec-cal">
    <div class="cal-header">
      <div class="cal-title" id="cal-title"></div>
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">&#8592;</button>
        <button onclick="changeMonth(1)">&#8594;</button>
      </div>
    </div>
    <div class="cal-summary" id="cal-summary"></div>
    <div class="weekdays">
      <div class="wd">Dom</div><div class="wd">Lun</div><div class="wd">Mar</div>
      <div class="wd">Mie</div><div class="wd">Jue</div><div class="wd">Vie</div><div class="wd">Sab</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- NUEVA OPERACION -->
  <div class="section" id="sec-nueva">
    <div class="form-card">
      <h3>Registrar operacion</h3>
      <div class="form-grid">
        <input type="date" id="f-fecha"/>
        <select id="f-strat">
          <option value="">Estrategia...</option>
          <option>Alpha</option>
          <option>Fury RR negativo</option>
          <option>Fury RR 1:2</option>
          <option>Fury 2.0</option>
        </select>
        <input type="text" id="f-par" placeholder="Par / activo (ej: EURUSD)"/>
        <input type="number" id="f-pct" placeholder="% resultado (ej: 2.5)" step="0.01"/>
        <input type="number" id="f-usd" placeholder="$ resultado (ej: 150)" step="0.01"/>
      </div>
      <div class="emp-row">
        <span class="field-label">Empresa</span>
        <div class="pill-group" id="emp-pills-nueva"></div>
      </div>
      <div class="emp-row" style="margin-bottom:16px">
        <span class="field-label">Cuenta</span>
        <div class="pill-group" id="cuenta-pills-nueva"><span class="hint-text">Selecciona una empresa primero</span></div>
      </div>
      <div class="form-grid">
        <textarea id="f-nota" placeholder="Notas opcionales..."></textarea>
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <button class="btn-add" onclick="addOp()">Guardar operacion</button>
        <span id="form-msg" style="font-size:12px"></span>
      </div>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div class="section" id="sec-historial">
    <div class="filter-row" id="filter-row-hist"></div>
    <div id="historial-content"></div>
  </div>

  <!-- POR MES -->
  <div class="section" id="sec-meses"><div id="meses-content"></div></div>

  <!-- ESTRATEGIAS -->
  <div class="section" id="sec-stats">
    <div class="seg-btns">
      <button class="seg-btn active" onclick="setSegment('mes',this)">Este mes</button>
      <button class="seg-btn" onclick="setSegment('ytd',this)">Todo el año</button>
    </div>
    <div id="stats-content"></div>
  </div>

  <!-- PLAN SEMANAL -->
  <div class="section" id="sec-plan">
    <div class="dias-semana" id="dias-btns-plan"></div>
    <div id="plan-content"></div>
  </div>

  <!-- MIS CUENTAS -->
  <div class="section" id="sec-cuentas">
    <div id="empresas-list"></div>
    <div class="add-emp-form">
      <h3>Agregar nueva empresa</h3>
      <div class="add-emp-row">
        <input type="text" id="new-emp-name" placeholder="Nombre (ej: FTMO)"/>
      </div>
      <div style="margin-bottom:12px">
        <span class="field-label">Color</span>
        <div class="color-pick" id="color-pick"></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <button class="btn-add" onclick="addEmpresa()">Agregar empresa</button>
        <span id="emp-msg" style="font-size:12px"></span>
      </div>
    </div>
  </div>
</div>

<script>
const STRATS=['Alpha','Fury RR negativo','Fury RR 1:2','Fury 2.0'];
const STRAT_COLORS={'Alpha':'#FF6B35','Fury RR negativo':'#118AB2','Fury RR 1:2':'#06D6A0','Fury 2.0':'#EF476F'};
const MONTHS_ES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTHS_SHORT=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const PALETTE=['#FF6B35','#7B61FF','#06D6A0','#118AB2','#EF476F','#FFD23F','#FF9F1C','#2EC4B6','#9B5DE5','#E71D36'];
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const TODAY_STR=TODAY.toISOString().split('T')[0];

const DEFAULT_EMPRESAS=[
  {id:'apex',name:'Apex',color:'#7B61FF',cuentas:[{id:'pa02',name:'PA02',tipo:'PA'}]},
  {id:'fundednext',name:'Fundednext',color:'#FF6B35',cuentas:[{id:'bolt',name:'Bolt',tipo:'Challenge'}]},
  {id:'lucid',name:'Lucid',color:'#06D6A0',cuentas:[{id:'lucidflex',name:'Lucidflex',tipo:'PA'}]}
];

let ops=[],empresas=[];
let calYear=2026,calMonth=TODAY.getMonth();
let chartRefs={},statsSegment='mes';
let selEmp='',selCuenta='',selColor=PALETTE[0];

function saveLocal(){
  try{localStorage.setItem('tj2026_ops',JSON.stringify(ops));localStorage.setItem('tj2026_empresas',JSON.stringify(empresas))}catch(e){}
}
function loadLocal(){
  try{
    // Migrate from old versions if new key doesn't exist
    const newOps=localStorage.getItem('tj2026_ops');
    if(newOps){
      ops=JSON.parse(newOps);
    } else {
      // Try old keys in order
      const oldKeys=['tj2026v5','tj2026v4','tj2026v3','tj2026v2','tj2026'];
      for(const k of oldKeys){
        const old=localStorage.getItem(k);
        if(old){ops=JSON.parse(old);break}
      }
    }
    const e=localStorage.getItem('tj2026_empresas');
    empresas=e?JSON.parse(e):JSON.parse(JSON.stringify(DEFAULT_EMPRESAS));
  }catch(e){empresas=JSON.parse(JSON.stringify(DEFAULT_EMPRESAS))}
}
document.getElementById('f-fecha').value=TODAY_STR;
loadLocal();

function buildColorPick(){
  document.getElementById('color-pick').innerHTML=PALETTE.map(c=>
    `<div class="color-opt${c===selColor?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}
function pickColor(c){selColor=c;buildColorPick()}
buildColorPick();

function fmt(v,dec=1){if(v===null||v===undefined||isNaN(v))return'—';return(v>=0?'+':'')+Number(v).toFixed(dec)}
function fmtU(v){if(v===null||isNaN(v))return'—';return(v>=0?'+$':'-$')+Math.abs(Number(v)).toFixed(0)}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function getEmp(id){return empresas.find(e=>e.id===id)}

function empBadge(o){
  const emp=getEmp(o.empresaId);
  const color=emp?emp.color:'#888';
  const empName=emp?emp.name:(o.empresa||'—');
  const cuenta=emp?emp.cuentas.find(c=>c.id===o.cuentaId):null;
  const cuentaName=cuenta?cuenta.name:(o.cuenta||'');
  const tipo=cuenta?(' · '+cuenta.tipo):'';
  return`<span style="display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;font-size:11px;font-family:'Syne',sans-serif;font-weight:500;background:${color}22;color:${color}">${empName}</span> <span style="font-family:'DM Mono',monospace;font-size:11px;color:#666">${cuentaName}${tipo}</span>`;
}

function buildEmpPills(){
  document.getElementById('emp-pills-nueva').innerHTML=empresas.length
    ? empresas.map(e=>`<button class="ep${selEmp===e.id?' sel':''}" style="${selEmp===e.id?'background:'+e.color+';border-color:'+e.color:''}" onclick="selectEmp('${e.id}')">${e.name}</button>`).join('')
    : `<span class="hint-text">Ve a "Mis cuentas" para agregar empresas</span>`;
}

function selectEmp(id){
  selEmp=id;selCuenta='';
  buildEmpPills();
  const emp=getEmp(id);
  if(!emp||!emp.cuentas.length){
    document.getElementById('cuenta-pills-nueva').innerHTML=`<span class="hint-text">Sin cuentas — agrégalas en "Mis cuentas"</span>`;
    return;
  }
  document.getElementById('cuenta-pills-nueva').innerHTML=emp.cuentas.map(c=>
    `<button class="cp" data-c="${c.id}" onclick="selectCuenta('${c.id}')">${c.name} <span style="font-size:10px;opacity:.6;margin-left:2px">${c.tipo}</span></button>`
  ).join('');
  if(emp.cuentas.length===1){selCuenta=emp.cuentas[0].id;document.querySelector('#cuenta-pills-nueva .cp').classList.add('sel')}
}

function selectCuenta(id){
  selCuenta=id;
  document.querySelectorAll('#cuenta-pills-nueva .cp').forEach(b=>b.classList.toggle('sel',b.dataset.c===id));
}

function showSec(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('show'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('show');
  btn.classList.add('active');
  if(id==='cal')renderCalendar();
  if(id==='nueva'){buildEmpPills()}
  if(id==='historial'){buildFilterHist();renderHistorial()}
  if(id==='meses')renderMeses();
  if(id==='stats')renderStats();
  if(id==='cuentas')renderCuentas();
  if(id==='plan'){loadPlan();buildDiasBtnsPlan();renderPlanDia();}
}

function setSegment(seg,btn){
  statsSegment=seg;
  document.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderStats();
}
function changeMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++}
  if(calMonth<0){calMonth=11;calYear--}
  renderCalendar();
}

function addOp(){
  const fecha=document.getElementById('f-fecha').value;
  const strat=document.getElementById('f-strat').value;
  const par=document.getElementById('f-par').value.trim();
  const pct=parseFloat(document.getElementById('f-pct').value);
  const usd=parseFloat(document.getElementById('f-usd').value);
  const nota=document.getElementById('f-nota').value.trim();
  const msg=document.getElementById('form-msg');
  if(!fecha||!strat||isNaN(pct)){msg.style.color='#EF476F';msg.textContent='Completa fecha, estrategia y %';setTimeout(()=>msg.textContent='',2500);return}
  if(!selEmp){msg.style.color='#EF476F';msg.textContent='Selecciona una empresa';setTimeout(()=>msg.textContent='',2500);return}
  if(!selCuenta){msg.style.color='#EF476F';msg.textContent='Selecciona una cuenta';setTimeout(()=>msg.textContent='',2500);return}
  const emp=getEmp(selEmp);
  const cuenta=emp?emp.cuentas.find(c=>c.id===selCuenta):null;
  ops.push({id:Date.now(),fecha,strat,empresaId:selEmp,cuentaId:selCuenta,empresa:emp?emp.name:'',cuenta:cuenta?cuenta.name:'',par:par||'—',pct,usd:isNaN(usd)?null:usd,nota});
  ops.sort((a,b)=>b.fecha.localeCompare(a.fecha));
  saveLocal();
  document.getElementById('f-par').value='';document.getElementById('f-pct').value='';
  document.getElementById('f-usd').value='';document.getElementById('f-nota').value='';
  msg.style.color='#06D6A0';msg.textContent='¡Guardado!';setTimeout(()=>msg.textContent='',2000);
}

function deleteOp(id){ops=ops.filter(o=>o.id!==id);saveLocal()}

function renderCuentas(){
  const el=document.getElementById('empresas-list');
  if(!empresas.length){el.innerHTML=`<div class="empty">No tienes empresas. Agrega una abajo.</div>`;return}
  el.innerHTML=empresas.map(emp=>`
    <div class="empresa-card">
      <div class="empresa-header">
        <div class="empresa-name">
          <div class="emp-dot" style="background:${emp.color}"></div>
          <div class="empresa-title">${emp.name}</div>
          <span style="font-size:11px;color:#555;font-family:'DM Mono',monospace">${emp.cuentas.length} cuenta${emp.cuentas.length!==1?'s':''}</span>
        </div>
        <button class="btn-danger" onclick="deleteEmpresa('${emp.id}')">Eliminar empresa</button>
      </div>
      <div class="cuentas-grid">
        ${emp.cuentas.length
          ? emp.cuentas.map(c=>`<div class="cuenta-chip">
              <span>${c.name}</span><span class="tipo">${c.tipo}</span>
              <button class="del-c" onclick="deleteCuenta('${emp.id}','${c.id}')" title="Eliminar">×</button>
            </div>`).join('')
          : `<span class="hint-text">Sin cuentas activas</span>`}
      </div>
      <div class="add-cuenta-row">
        <input type="text" id="nc-name-${emp.id}" placeholder="Nombre cuenta"/>
        <select id="nc-tipo-${emp.id}">
          <option value="PA">PA</option>
          <option value="Challenge">Challenge</option>
          <option value="Evaluation">Evaluation</option>
          <option value="Live">Live</option>
          <option value="Otro">Otro</option>
        </select>
        <button class="btn-sec" onclick="addCuenta('${emp.id}')">+ Agregar cuenta</button>
      </div>
    </div>`).join('');
}

function addEmpresa(){
  const name=document.getElementById('new-emp-name').value.trim();
  const msg=document.getElementById('emp-msg');
  if(!name){msg.style.color='#EF476F';msg.textContent='Escribe el nombre';setTimeout(()=>msg.textContent='',2000);return}
  if(empresas.find(e=>e.name.toLowerCase()===name.toLowerCase())){msg.style.color='#EF476F';msg.textContent='Ya existe esa empresa';setTimeout(()=>msg.textContent='',2000);return}
  empresas.push({id:genId(),name,color:selColor,cuentas:[]});
  saveLocal();
  document.getElementById('new-emp-name').value='';
  msg.style.color='#06D6A0';msg.textContent='¡Empresa agregada!';setTimeout(()=>msg.textContent='',2000);
  renderCuentas();buildEmpPills();
}

function deleteEmpresa(id){
  if(!confirm('¿Eliminar esta empresa y todas sus cuentas?'))return;
  empresas=empresas.filter(e=>e.id!==id);
  if(selEmp===id){selEmp='';selCuenta=''}
  saveLocal();renderCuentas();buildEmpPills();
}

function addCuenta(empId){
  const nameEl=document.getElementById('nc-name-'+empId);
  const tipoEl=document.getElementById('nc-tipo-'+empId);
  const name=nameEl.value.trim();
  if(!name)return;
  const emp=getEmp(empId);if(!emp)return;
  emp.cuentas.push({id:genId(),name,tipo:tipoEl.value});
  saveLocal();nameEl.value='';
  renderCuentas();buildEmpPills();
}

function deleteCuenta(empId,cuentaId){
  const emp=getEmp(empId);if(!emp)return;
  if(!confirm(`¿Eliminar la cuenta "${emp.cuentas.find(c=>c.id===cuentaId)?.name}"?`))return;
  emp.cuentas=emp.cuentas.filter(c=>c.id!==cuentaId);
  if(selCuenta===cuentaId)selCuenta='';
  saveLocal();renderCuentas();buildEmpPills();
}

function buildFilterHist(){
  const el=document.getElementById('filter-row-hist');if(!el)return;
  const empOpts=empresas.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
  const cuentaOpts=empresas.flatMap(e=>e.cuentas.map(c=>`<option value="${c.id}">${c.name} (${e.name})</option>`)).join('');
  el.innerHTML=`
    <select id="fil-strat" onchange="renderHistorial()">
      <option value="">Todas las estrategias</option>
      ${STRATS.map(s=>`<option>${s}</option>`).join('')}
    </select>
    <select id="fil-emp" onchange="renderHistorial()">
      <option value="">Todas las empresas</option>${empOpts}
    </select>
    <select id="fil-cuenta" onchange="renderHistorial()">
      <option value="">Todas las cuentas</option>${cuentaOpts}
    </select>
    <select id="fil-res" onchange="renderHistorial()">
      <option value="">Todas</option>
      <option value="pos">Solo ganancias</option>
      <option value="neg">Solo perdidas</option>
    </select>`;
}

function renderCalendar(){
  document.getElementById('cal-title').textContent=MONTHS_ES[calMonth]+' '+calYear;
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prefix=calYear+'-'+String(calMonth+1).padStart(2,'0');
  const dayMap={};
  ops.forEach(o=>{
    if(!o.fecha.startsWith(prefix))return;
    if(!dayMap[o.fecha])dayMap[o.fecha]={pct:0,usd:0,count:0};
    dayMap[o.fecha].pct+=o.pct;dayMap[o.fecha].usd+=(o.usd||0);dayMap[o.fecha].count++;
  });
  const monthOps=ops.filter(o=>o.fecha.startsWith(prefix));
  const tp=monthOps.reduce((a,o)=>a+o.pct,0);
  const tu=monthOps.reduce((a,o)=>a+(o.usd||0),0);
  const wins=monthOps.filter(o=>o.pct>=0).length;
  const winDays=Object.values(dayMap).filter(d=>d.pct>=0).length;
  const lossDays=Object.values(dayMap).filter(d=>d.pct<0).length;
  document.getElementById('cal-summary').innerHTML=`
    <div class="cs"><div class="cl">Mes %</div><div class="cv ${tp>=0?'pos':'neg'}">${fmt(tp)}%</div></div>
    <div class="cs"><div class="cl">Mes $</div><div class="cv ${tu>=0?'pos':'neg'}">${fmtU(tu)}</div></div>
    <div class="cs"><div class="cl">Operaciones</div><div class="cv neu">${monthOps.length}</div></div>
    <div class="cs"><div class="cl">Win rate</div><div class="cv neu">${monthOps.length?Math.round(wins/monthOps.length*100):0}%</div></div>
    <div class="cs"><div class="cl">Dias verde</div><div class="cv pos">${winDays}</div></div>
    <div class="cs"><div class="cl">Dias rojo</div><div class="cv neg">${lossDays}</div></div>`;
  let cells='';
  for(let i=0;i<firstDay;i++)cells+=`<div class="day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=prefix+'-'+String(d).padStart(2,'0');
    const cd=new Date(calYear,calMonth,d);
    const isFut=cd>TODAY,isT=ds===TODAY_STR,data=dayMap[ds];
    let cls='day';
    if(isFut)cls+=' future';else if(!data)cls+=' zero';else if(data.pct>=0)cls+=' win';else cls+=' loss';
    if(isT)cls+=' today';
    const lbl=data?`<div class="da">${fmtU(data.usd)}</div><div class="dt">${data.count} trade${data.count!==1?'s':''}</div>`
      :`<div class="da" style="font-size:11px">${isFut?'':'$0.00'}</div><div class="dt">${isFut?'':'0 trades'}</div>`;
    cells+=`<div class="${cls}" onclick="openDay('${ds}')"><div class="dn">${d}</div>${lbl}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=cells;
}

function openDay(ds){
  const dayOps=ops.filter(o=>o.fecha===ds);
  const d=new Date(ds+'T12:00:00');
  const label=d.getDate()+' de '+MONTHS_ES[d.getMonth()]+' '+d.getFullYear();
  const tp=dayOps.reduce((a,o)=>a+o.pct,0);
  const tu=dayOps.reduce((a,o)=>a+(o.usd||0),0);
  let content=!dayOps.length?`<p style="color:#666;font-size:13px;margin-bottom:1rem">Sin operaciones este dia.</p>`
    :`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem">
        <div class="cs"><div class="cl">Total %</div><div class="cv ${tp>=0?'pos':'neg'}">${fmt(tp)}%</div></div>
        <div class="cs"><div class="cl">Total $</div><div class="cv ${tu>=0?'pos':'neg'}">${fmtU(tu)}</div></div>
      </div>
      ${dayOps.map(o=>`<div class="op-card">
        <div class="op-card-top">
          <span style="font-size:13px;font-weight:500"><span class="sdot" style="background:${STRAT_COLORS[o.strat]||'#888'}"></span>${o.strat}</span>
          <span class="badge ${o.pct>=0?'pos':'neg'}">${fmt(o.pct)}%</span>
        </div>
        <div style="margin-bottom:5px">${empBadge(o)}</div>
        <div class="op-card-meta">
          <span>Par: ${o.par}</span>
          ${o.usd!==null?`<span class="${o.usd>=0?'pos':'neg'}">${fmtU(o.usd)}</span>`:''}
          ${o.nota?`<span>${o.nota}</span>`:''}
        </div>
        <button class="del-btn" onclick="deleteOp(${o.id});closeModal();renderCalendar()" style="margin-top:8px;font-size:11px;color:#555">Eliminar</button>
      </div>`).join('')}`;
  document.body.insertAdjacentHTML('beforeend',`<div class="modal-bg" id="modal-bg" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3>${label}</h3>${content}
      <button class="btn-add" style="margin-top:10px;font-size:12px;padding:7px 16px" onclick="closeModal();prefillDate('${ds}')">+ Agregar operacion</button>
    </div></div>`);
}

function closeModal(){const m=document.getElementById('modal-bg');if(m)m.remove()}
function prefillDate(ds){
  document.getElementById('f-fecha').value=ds;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('show'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-nueva').classList.add('show');
  document.querySelectorAll('.nav-btn')[1].classList.add('active');
  buildEmpPills();
}

function renderHistorial(){
  const fs=document.getElementById('fil-strat')?.value||'';
  const fe=document.getElementById('fil-emp')?.value||'';
  const fc=document.getElementById('fil-cuenta')?.value||'';
  const fr=document.getElementById('fil-res')?.value||'';
  let data=ops.filter(o=>{
    if(fs&&o.strat!==fs)return false;
    if(fe&&o.empresaId!==fe)return false;
    if(fc&&o.cuentaId!==fc)return false;
    if(fr==='pos'&&o.pct<0)return false;
    if(fr==='neg'&&o.pct>=0)return false;
    return true;
  });
  const el=document.getElementById('historial-content');
  if(!data.length){el.innerHTML=`<div class="empty">Sin operaciones registradas</div>`;return}
  const tp=data.reduce((a,o)=>a+o.pct,0);
  const wins=data.filter(o=>o.pct>=0).length;
  el.innerHTML=`
  <div class="metrics">
    <div class="mc"><div class="ml">Total ops</div><div class="mv neu">${data.length}</div></div>
    <div class="mc"><div class="ml">% acumulado</div><div class="mv ${tp>=0?'pos':'neg'}">${fmt(tp)}%</div></div>
    <div class="mc"><div class="ml">Win rate</div><div class="mv neu">${Math.round(wins/data.length*100)}%</div></div>
  </div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Fecha</th><th>Estrategia</th><th>Empresa / Cuenta</th><th>Par</th><th>%</th><th>$</th><th>Notas</th><th></th></tr></thead>
    <tbody>${data.map(o=>`<tr>
      <td>${o.fecha}</td>
      <td class="nc"><span class="sdot" style="background:${STRAT_COLORS[o.strat]||'#888'}"></span>${o.strat}</td>
      <td>${empBadge(o)}</td><td>${o.par}</td>
      <td><span class="badge ${o.pct>=0?'pos':'neg'}">${fmt(o.pct)}%</span></td>
      <td>${o.usd!==null?`<span class="${o.usd>=0?'pos':'neg'}">${fmtU(o.usd)}</span>`:'—'}</td>
      <td style="font-family:'Syne',sans-serif;font-size:12px;color:#666;max-width:120px;white-space:normal">${o.nota||'—'}</td>
      <td><button class="del-btn" onclick="deleteOp(${o.id});renderHistorial()">×</button></td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function renderMeses(){
  const el=document.getElementById('meses-content');
  if(!ops.length){el.innerHTML=`<div class="empty">Sin operaciones</div>`;return}
  const grouped={};
  ops.forEach(o=>{const k=o.fecha.slice(0,7);if(!grouped[k])grouped[k]=[];grouped[k].push(o)});
  el.innerHTML=Object.keys(grouped).sort((a,b)=>b.localeCompare(a)).map(k=>{
    const list=grouped[k],[yr,mo]=k.split('-');
    const tp=list.reduce((a,o)=>a+o.pct,0);
    const wins=list.filter(o=>o.pct>=0).length;
    return`<div class="month-group">
      <div class="month-title">${MONTHS_ES[parseInt(mo)-1]} ${yr}
        <span class="mt-sum ${tp>=0?'pos':'neg'}">${fmt(tp)}%</span>
        <span style="font-size:11px;color:#555;font-family:'DM Mono',monospace">${list.length} ops · WR ${Math.round(wins/list.length*100)}%</span>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Dia</th><th>Estrategia</th><th>Empresa / Cuenta</th><th>Par</th><th>%</th><th>$</th><th>Notas</th></tr></thead>
        <tbody>${list.map(o=>`<tr>
          <td>${o.fecha.slice(8)}</td>
          <td class="nc"><span class="sdot" style="background:${STRAT_COLORS[o.strat]||'#888'}"></span>${o.strat}</td>
          <td>${empBadge(o)}</td><td>${o.par}</td>
          <td><span class="badge ${o.pct>=0?'pos':'neg'}">${fmt(o.pct)}%</span></td>
          <td>${o.usd!==null?`<span class="${o.usd>=0?'pos':'neg'}">${fmtU(o.usd)}</span>`:'—'}</td>
          <td style="font-family:'Syne',sans-serif;font-size:12px;color:#666;max-width:120px;white-space:normal">${o.nota||'—'}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`;
  }).join('');
}

function destroyChart(id){if(chartRefs[id]){chartRefs[id].destroy();delete chartRefs[id]}}

function renderStats(){
  const el=document.getElementById('stats-content');
  const nowM=TODAY.getMonth(),nowY=TODAY.getFullYear();
  const filtered=statsSegment==='mes'
    ?ops.filter(o=>o.fecha.startsWith(nowY+'-'+String(nowM+1).padStart(2,'0')))
    :ops.filter(o=>o.fecha.startsWith('2026'));
  const stratTotals={};STRATS.forEach(s=>stratTotals[s]=0);
  filtered.forEach(o=>{stratTotals[o.strat]=(stratTotals[o.strat]||0)+o.pct});
  const ranked=STRATS.map(s=>({name:s,val:stratTotals[s]})).sort((a,b)=>b.val-a.val);
  const rankNums=['r1','r2','r3','r4'],rankLabels=['1°','2°','3°','4°'];
  const monthKeys=[...new Set(ops.filter(o=>o.fecha.startsWith('2026')).map(o=>o.fecha.slice(0,7)))].sort();
  const monthLabels=monthKeys.map(k=>MONTHS_SHORT[parseInt(k.split('-')[1])-1]);
  const mkD=s=>monthKeys.map(k=>{const mo=ops.filter(o=>o.strat===s&&o.fecha.startsWith(k));return mo.length?+mo.reduce((a,o)=>a+o.pct,0).toFixed(2):null});
  const mkC=s=>{let c=0;return monthKeys.map(k=>{const mo=ops.filter(o=>o.strat===s&&o.fecha.startsWith(k));if(mo.length){c+=mo.reduce((a,o)=>a+o.pct,0);return+c.toFixed(2)}return null})};
  const hasM=monthKeys.length>0;
  el.innerHTML=`
  <div class="ranking-grid">${ranked.map((r,i)=>`
    <div class="rank-card" style="border-left:3px solid ${STRAT_COLORS[r.name]}">
      <div class="rank-num ${rankNums[i]}">${rankLabels[i]}</div>
      <div class="rank-info"><div class="rn">${r.name}</div><div class="rv ${r.val>=0?'pos':'neg'}">${fmt(r.val)}%</div></div>
    </div>`).join('')}
  </div>
  ${hasM?`
  <div class="chart-wrap"><h3>Rendimiento mensual por estrategia</h3>
    <div class="legend">${STRATS.map(s=>`<div class="legend-item"><div class="legend-dot" style="background:${STRAT_COLORS[s]}"></div>${s}</div>`).join('')}</div>
    <div class="chart-h tall"><canvas id="ch-line"></canvas></div>
  </div>
  <div class="chart-wrap"><h3>Retorno acumulado por estrategia</h3>
    <div class="legend">${STRATS.map(s=>`<div class="legend-item"><div class="legend-dot" style="background:${STRAT_COLORS[s]}"></div>${s}</div>`).join('')}</div>
    <div class="chart-h tall"><canvas id="ch-cum"></canvas></div>
  </div>
  <div class="chart-wrap"><h3>Comparativa por mes — barras</h3>
    <div class="chart-h tall"><canvas id="ch-bar"></canvas></div>
  </div>`:`<div class="empty">Registra operaciones para ver las graficas comparativas</div>`}`;
  if(!hasM)return;
  setTimeout(()=>{
    destroyChart('line');destroyChart('cum');destroyChart('bar');
    const gc='rgba(255,255,255,.06)',tc='#555';
    const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:gc},ticks:{font:{size:11},color:tc}},y:{grid:{color:gc},ticks:{font:{size:11},color:tc,callback:v=>v+'%'}}}};
    const mkDs=fn=>STRATS.map(s=>({label:s,data:fn(s),borderColor:STRAT_COLORS[s],backgroundColor:'transparent',tension:0.4,borderWidth:2.5,pointRadius:5,pointBackgroundColor:STRAT_COLORS[s],spanGaps:false}));
    const c1=document.getElementById('ch-line');if(c1)chartRefs['line']=new Chart(c1,{type:'line',data:{labels:monthLabels,datasets:mkDs(mkD)},options:base});
    const c2=document.getElementById('ch-cum');if(c2)chartRefs['cum']=new Chart(c2,{type:'line',data:{labels:monthLabels,datasets:mkDs(mkC)},options:base});
    const c3=document.getElementById('ch-bar');if(c3)chartRefs['bar']=new Chart(c3,{type:'bar',data:{labels:monthLabels,datasets:STRATS.map(s=>({label:s,data:monthKeys.map(k=>{const mo=ops.filter(o=>o.strat===s&&o.fecha.startsWith(k));return mo.length?+mo.reduce((a,o)=>a+o.pct,0).toFixed(2):0}),backgroundColor:STRAT_COLORS[s]+'BB',borderRadius:4,borderSkipped:false}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{font:{size:11},boxWidth:10,padding:12,color:tc}}},scales:{x:{grid:{color:gc},ticks:{font:{size:11},color:tc}},y:{grid:{color:gc},ticks:{font:{size:11},color:tc,callback:v=>v+'%'}}}}});
  },80);
}

// ===================== PLAN SEMANAL =====================
// Estructura: cada cuenta tiene params por dia { 0:{inst,ticks,rr,riesgo,maxTrades}, 1:{...}, ... }
const DIAS_SEMANA=['Lunes','Martes','Miercoles','Jueves','Viernes'];
const TIPO_COLORS_PLAN={'Fondeada':'#06D6A0','Challenge':'#FFD23F','Evaluation':'#118AB2','PA':'#7B61FF','Live':'#FF6B35','Otro':'#888'};
const PLAN_PALETTE=['#FF6B35','#7B61FF','#06D6A0','#118AB2','#EF476F','#FFD23F','#9B5DE5','#2EC4B6'];
const TODAY_DOW=new Date().getDay();
const HOY_IDX=TODAY_DOW>=1&&TODAY_DOW<=5?TODAY_DOW-1:-1;

let activeDiaPlan=HOY_IDX>=0?HOY_IDX:0;
let planData=[];
let planEditId=null;
let planEditDia=null;
let planSelColor=PLAN_PALETTE[0];

// Nueva estructura: params son objeto por dia {0:{...},1:{...},...}
const PLAN_DEFAULT=[
  {id:'p1',empresa:'Apex',cuenta:'PA02',nombre:'Alpha',tipo:'Fondeada',color:'#7B61FF',
    params:{0:{instrumento:'NQ',ticks:'N/A',rr:'1:0.5',riesgo:'$400',maxTrades:'1'},
            1:{instrumento:'NQ',ticks:'N/A',rr:'1:0.5',riesgo:'$400',maxTrades:'1'},
            2:{instrumento:'NQ',ticks:'N/A',rr:'1:0.5',riesgo:'$400',maxTrades:'1'},
            3:{instrumento:'NQ',ticks:'N/A',rr:'1:0.5',riesgo:'$400',maxTrades:'1'},
            4:{instrumento:'NQ',ticks:'N/A',rr:'1:0.5',riesgo:'$400',maxTrades:'1'}}},
  {id:'p2',empresa:'Fundednext',cuenta:'Bolt',nombre:'Fury 2.0',tipo:'Challenge',color:'#FF6B35',
    params:{0:{instrumento:'NQ',ticks:'N/A',rr:'1:0.5',riesgo:'$400',maxTrades:'1'},
            1:{instrumento:'NQ',ticks:'N/A',rr:'1:0.5',riesgo:'$400',maxTrades:'1'},
            2:{instrumento:'NQ',ticks:'N/A',rr:'1:0.5',riesgo:'$400',maxTrades:'1'},
            3:{instrumento:'NQ',ticks:'N/A',rr:'1:0.5',riesgo:'$400',maxTrades:'1'},
            4:{instrumento:'NQ',ticks:'N/A',rr:'1:0.5',riesgo:'$400',maxTrades:'1'}}},
  {id:'p3',empresa:'Lucid',cuenta:'Lucidflex',nombre:'Fury',tipo:'Challenge',color:'#06D6A0',
    params:{0:{instrumento:'MES',ticks:'2300',rr:'1:0.24',riesgo:'$1.000',maxTrades:'2'},
            1:{instrumento:'MNQ',ticks:'4500',rr:'1:0.25',riesgo:'$1.000',maxTrades:'2'},
            2:{instrumento:'MNQ',ticks:'4500',rr:'1:0.25',riesgo:'$1.000',maxTrades:'2'},
            3:{instrumento:'MES',ticks:'2300',rr:'1:0.24',riesgo:'$1.000',maxTrades:'2'},
            4:{instrumento:'MES',ticks:'2300',rr:'1:0.24',riesgo:'$1.000',maxTrades:'2'}}}
];

function savePlan(){try{localStorage.setItem('tj_plan',JSON.stringify(planData))}catch(e){}}
function loadPlan(){
  try{
    const d=localStorage.getItem('tj_plan');
    if(d){
      const parsed=JSON.parse(d);
      // Migrate old format (dias array + flat params) to new format (params per day)
      planData=parsed.map(p=>{
        if(!p.params){
          const dayParams={instrumento:p.instrumento||'',ticks:p.ticks||'',rr:p.rr||'',riesgo:p.riesgo||'',maxTrades:p.maxTrades||''};
          const dias=p.dias||[0,1,2,3,4];
          const params={};
          dias.forEach(d=>params[d]={...dayParams});
          return{id:p.id,empresa:p.empresa,cuenta:p.cuenta||'',nombre:p.nombre,tipo:p.tipo,color:p.color,params};
        }
        return p;
      });
    } else {
      planData=JSON.parse(JSON.stringify(PLAN_DEFAULT));
    }
  }catch(e){planData=JSON.parse(JSON.stringify(PLAN_DEFAULT))}
}
loadPlan();

function getDias(p){return Object.keys(p.params).map(Number)}

function buildDiasBtnsPlan(){
  document.getElementById('dias-btns-plan').innerHTML=DIAS_SEMANA.map((d,i)=>`
    <button class="dia-btn${activeDiaPlan===i?' active':''}${HOY_IDX===i?' hoy':''}" onclick="setDiaPlan(${i})">
      ${d}${HOY_IDX===i?'<span class="hoy-badge">hoy</span>':''}
    </button>`).join('');
}

function setDiaPlan(i){activeDiaPlan=i;buildDiasBtnsPlan();renderPlanDia()}

function renderPlanDia(){
  const diaName=DIAS_SEMANA[activeDiaPlan];
  const cuentas=planData.filter(p=>p.params&&p.params[activeDiaPlan]!==undefined);
  const isHoy=HOY_IDX===activeDiaPlan;
  document.getElementById('plan-content').innerHTML=`
    <div class="plan-header">
      <div class="plan-title">Cuentas — ${diaName}${isHoy?` <span class="hoy-badge">hoy</span>`:''}</div>
      <button class="btn-add" onclick="openPlanModalNueva()" style="font-size:12px;padding:6px 16px">+ Agregar cuenta</button>
    </div>
    ${cuentas.length
      ?`<div class="cuentas-plan-grid">${cuentas.map(p=>planCardHTML(p,activeDiaPlan)).join('')}</div>`
      :`<div class="plan-empty">No hay cuentas para ${diaName}.<br>Haz clic en "+ Agregar cuenta".</div>`}`;
}

function planCardHTML(p,dia){
  const tc=TIPO_COLORS_PLAN[p.tipo]||'#888';
  const pr=p.params[dia]||{};
  return`<div class="plan-card" style="border-left:3px solid ${p.color}">
    <div class="plan-card-header">
      <span class="plan-card-emp">${p.empresa.toUpperCase()}${p.cuenta?' · '+p.cuenta:''}</span>
      <span class="plan-card-tipo" style="background:${tc}22;color:${tc}">${p.tipo}</span>
    </div>
    <div class="plan-card-nombre">${p.nombre}</div>
    <div class="plan-params">
      <div class="pp"><div class="ppl">Instrumento</div><div class="ppv">${pr.instrumento||'—'}</div></div>
      <div class="pp"><div class="ppl">Ticks</div><div class="ppv">${pr.ticks||'—'}</div></div>
      <div class="pp"><div class="ppl">RR</div><div class="ppv">${pr.rr||'—'}</div></div>
      <div class="pp"><div class="ppl">Riesgo</div><div class="ppv">${pr.riesgo||'—'}</div></div>
      <div class="pp full"><div class="ppl">Max. trades / dia</div><div class="ppv">${pr.maxTrades||'—'}</div></div>
    </div>
    <div class="plan-actions">
      <button class="plan-btn-edit" onclick="openPlanModalEditar('${p.id}',${dia})">Editar</button>
      <button class="plan-btn-rem" onclick="quitarDiaPlan('${p.id}',${dia})">Quitar dia</button>
    </div>
  </div>`;
}

function quitarDiaPlan(id,dia){
  const p=planData.find(x=>x.id===id);if(!p)return;
  delete p.params[dia];
  if(!Object.keys(p.params).length){
    if(!confirm('Esta cuenta ya no tiene dias activos. ¿Eliminarla?'))return;
    planData=planData.filter(x=>x.id!==id);
  }
  savePlan();renderPlanDia();
}

// Modal para NUEVA cuenta — configura info base + params para cada dia seleccionado
function openPlanModalNueva(){
  planEditId=null;planEditDia=null;
  planSelColor=PLAN_PALETTE[0];
  const diasHtml=DIAS_SEMANA.map((d,i)=>`
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer" onclick="togglePlanDiaSection(${i})">
        <div id="dc-check-${i}" style="width:16px;height:16px;border-radius:4px;border:1px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s"></div>
        <span style="font-size:13px;font-weight:500">${d}</span>
      </div>
      <div id="dc-params-${i}" style="display:none;grid-template-columns:1fr 1fr;gap:6px">
        <div class="pf"><label>Instrumento</label><input id="pn-inst-${i}" placeholder="ej: NQ"/></div>
        <div class="pf"><label>Ticks</label><input id="pn-ticks-${i}" placeholder="ej: 2300"/></div>
        <div class="pf"><label>RR</label><input id="pn-rr-${i}" placeholder="ej: 1:0.5"/></div>
        <div class="pf"><label>Riesgo</label><input id="pn-riesgo-${i}" placeholder="ej: $400"/></div>
        <div class="pf" style="grid-column:1/-1"><label>Max. trades / dia</label><input id="pn-max-${i}" placeholder="ej: 1"/></div>
      </div>
    </div>`).join('');

  document.body.insertAdjacentHTML('beforeend',`<div class="plan-modal-bg" id="plan-modal-bg" onclick="closePlanModal()">
    <div class="plan-modal" onclick="event.stopPropagation()">
      <button class="plan-modal-close" onclick="closePlanModal()">×</button>
      <h3>Nueva cuenta</h3>
      <div class="pf"><label>Empresa</label><input id="pm-emp" placeholder="ej: Apex"/></div>
      <div class="pf"><label>Cuenta</label><input id="pm-cuenta" placeholder="ej: PA02, Challenge10"/></div>
      <div class="pf"><label>Nombre / Estrategia</label><input id="pm-nom" placeholder="ej: Alpha"/></div>
      <div class="pf"><label>Tipo</label>
        <select id="pm-tipo">${['Fondeada','Challenge','Evaluation','PA','Live','Otro'].map(t=>`<option>${t}</option>`).join('')}</select>
      </div>
      <div class="pf"><label>Color</label>
        <div class="color-row" id="pm-colors">
          ${PLAN_PALETTE.map(c=>`<div class="co${c===planSelColor?' sel':''}" style="background:${c}" onclick="pickPlanColor('${c}')"></div>`).join('')}
        </div>
      </div>
      <div class="pf"><label>Parametros por dia — selecciona los dias que opera</label>${diasHtml}</div>
      <div class="plan-modal-footer">
        <button class="pm-cancel" onclick="closePlanModal()">Cancelar</button>
        <button class="pm-save" onclick="savePlanModalNueva()">Guardar</button>
      </div>
    </div></div>`);
}

function togglePlanDiaSection(i){
  const check=document.getElementById('dc-check-'+i);
  const params=document.getElementById('dc-params-'+i);
  const active=params.style.display==='grid';
  params.style.display=active?'none':'grid';
  check.style.background=active?'transparent':'var(--orange)';
  check.style.borderColor=active?'var(--border2)':'var(--orange)';
  check.innerHTML=active?'':'✓';
}

// Modal para EDITAR — solo parámetros del día específico + info base
function openPlanModalEditar(id,dia){
  planEditId=id;planEditDia=dia;
  const p=planData.find(x=>x.id===id);if(!p)return;
  planSelColor=p.color;
  const pr=p.params[dia]||{};
  document.body.insertAdjacentHTML('beforeend',`<div class="plan-modal-bg" id="plan-modal-bg" onclick="closePlanModal()">
    <div class="plan-modal" onclick="event.stopPropagation()">
      <button class="plan-modal-close" onclick="closePlanModal()">×</button>
      <h3>Editar — ${p.nombre} · ${DIAS_SEMANA[dia]}</h3>
      <div class="pf"><label>Empresa</label><input id="pm-emp" value="${p.empresa}"/></div>
      <div class="pf"><label>Cuenta</label><input id="pm-cuenta" value="${p.cuenta||''}"/></div>
      <div class="pf"><label>Nombre / Estrategia</label><input id="pm-nom" value="${p.nombre}"/></div>
      <div class="pf"><label>Tipo</label>
        <select id="pm-tipo">${['Fondeada','Challenge','Evaluation','PA','Live','Otro'].map(t=>`<option${p.tipo===t?' selected':''}>${t}</option>`).join('')}</select>
      </div>
      <div class="pf"><label>Color</label>
        <div class="color-row" id="pm-colors">
          ${PLAN_PALETTE.map(c=>`<div class="co${c===planSelColor?' sel':''}" style="background:${c}" onclick="pickPlanColor('${c}')"></div>`).join('')}
        </div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--orange);border-radius:10px;padding:12px;margin-bottom:10px">
        <div style="font-size:11px;color:var(--orange);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;font-weight:500">Parametros — ${DIAS_SEMANA[dia]}</div>
        <div class="pf-grid">
          <div class="pf"><label>Instrumento</label><input id="pm-inst" value="${pr.instrumento||''}"/></div>
          <div class="pf"><label>Ticks</label><input id="pm-ticks" value="${pr.ticks||''}"/></div>
          <div class="pf"><label>RR</label><input id="pm-rr" value="${pr.rr||''}"/></div>
          <div class="pf"><label>Riesgo</label><input id="pm-riesgo" value="${pr.riesgo||''}"/></div>
        </div>
        <div class="pf"><label>Max. trades / dia</label><input id="pm-max" value="${pr.maxTrades||''}"/></div>
      </div>
      <div style="font-size:11px;color:var(--txt2);margin-bottom:12px">¿Aplicar estos parámetros a otros días también?
        <div class="dias-check" style="margin-top:6px" id="pm-copiar-dias">
          ${DIAS_SEMANA.map((d,i)=>`<div class="dc${i===dia?' sel':''}" onclick="toggleCopyDia(${i})" data-d="${i}">${d}</div>`).join('')}
        </div>
      </div>
      <div class="plan-modal-footer">
        <button class="pm-cancel" onclick="closePlanModal()">Cancelar</button>
        <button class="pm-save" onclick="savePlanModalEditar()">Guardar</button>
      </div>
    </div></div>`);
}

function toggleCopyDia(i){
  document.querySelectorAll('#pm-copiar-dias .dc').forEach((el)=>{
    if(parseInt(el.dataset.d)===i)el.classList.toggle('sel');
  });
}

function pickPlanColor(c){
  planSelColor=c;
  document.querySelectorAll('#pm-colors .co').forEach(el=>el.classList.toggle('sel',el.style.background===c));
}

function savePlanModalNueva(){
  const emp=document.getElementById('pm-emp').value.trim();
  const nom=document.getElementById('pm-nom').value.trim();
  if(!emp||!nom){alert('Completa empresa y nombre');return}
  const params={};
  DIAS_SEMANA.forEach((_,i)=>{
    const paramsEl=document.getElementById('dc-params-'+i);
    if(paramsEl&&paramsEl.style.display==='grid'){
      params[i]={
        instrumento:document.getElementById('pn-inst-'+i)?.value.trim()||'',
        ticks:document.getElementById('pn-ticks-'+i)?.value.trim()||'',
        rr:document.getElementById('pn-rr-'+i)?.value.trim()||'',
        riesgo:document.getElementById('pn-riesgo-'+i)?.value.trim()||'',
        maxTrades:document.getElementById('pn-max-'+i)?.value.trim()||''
      };
    }
  });
  if(!Object.keys(params).length){alert('Selecciona al menos un dia');return}
  planData.push({id:genId(),empresa:emp,cuenta:document.getElementById('pm-cuenta').value.trim(),
    nombre:nom,tipo:document.getElementById('pm-tipo').value,color:planSelColor,params});
  savePlan();closePlanModal();renderPlanDia();
}

function savePlanModalEditar(){
  const p=planData.find(x=>x.id===planEditId);if(!p)return;
  p.empresa=document.getElementById('pm-emp').value.trim();
  p.cuenta=document.getElementById('pm-cuenta').value.trim();
  p.nombre=document.getElementById('pm-nom').value.trim();
  p.tipo=document.getElementById('pm-tipo').value;
  p.color=planSelColor;
  const pr={
    instrumento:document.getElementById('pm-inst').value.trim(),
    ticks:document.getElementById('pm-ticks').value.trim(),
    rr:document.getElementById('pm-rr').value.trim(),
    riesgo:document.getElementById('pm-riesgo').value.trim(),
    maxTrades:document.getElementById('pm-max').value.trim()
  };
  // Apply to selected days
  document.querySelectorAll('#pm-copiar-dias .dc.sel').forEach(el=>{
    p.params[parseInt(el.dataset.d)]={...pr};
  });
  savePlan();closePlanModal();renderPlanDia();
}

function closePlanModal(){const m=document.getElementById('plan-modal-bg');if(m)m.remove()}

// ===================== END PLAN SEMANAL =====================

buildEmpPills();
renderCalendar();
</script>
